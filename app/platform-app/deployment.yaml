apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-app
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform-app
  template:
    metadata:
      labels:
        app: platform-app
    spec:
      imagePullSecrets:
        - name: ghcr-secret

      containers:
        - name: app
          image: ghcr.io/dhia-03/platform-project:6d6a9a5fc5ad499545ea5afaafed577d79db288b

          # ✅ FIX for CKV_K8S_15
          imagePullPolicy: Always

          ports:
            - containerPort: 5000

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
