apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform-app
  template:
    metadata:
      labels:
        app: platform-app
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: app
          image: ghcr.io/dhia-03/platform-project:eb38ddeba9258478d2540f320c502cf63aef5952
          ports:
            - containerPort: 5000
