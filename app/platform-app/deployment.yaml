apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-app
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform-app
  template:
    metadata:
      labels:
        app: platform-app

    # ✅ THIS IS THE MISSING PIECE
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000

      imagePullSecrets:
        - name: ghcr-secret

      containers:
        - name: app
          image: ghcr.io/dhia-03/platform-project:5c94e8f81d69cb6913b71930e8d9cf02caef2c6a
          imagePullPolicy: Always

          ports:
            - containerPort: 5000

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
