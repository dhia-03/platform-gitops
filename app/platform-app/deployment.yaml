apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-app
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform-app
  template:
    metadata:
      labels:
        app: platform-app
    spec:
      imagePullSecrets:
        - name: ghcr-secret

      containers:
        - name: app
          image: ghcr.io/dhia-03/platform-project:6d6a9a5fc5ad499545ea5afaafed577d79db288b
          ports:
            - containerPort: 5000

          # ✅ FIX 1: Resource limits (Checkov CKV_K8S_11)
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          # ✅ FIX 2: Security context (Checkov CKV_K8S_37)
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
