apiVersion: v1
kind: ServiceAccount
metadata:
  name: platform-app-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: platform-app-role
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: platform-app-rolebinding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: platform-app-sa
    namespace: default
roleRef:
  kind: Role
  name: platform-app-role
  apiGroup: rbac.authorization.k8s.io
